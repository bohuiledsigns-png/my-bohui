<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GLOWFORGE · 履约监控</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0c14;--card:#12162a;--card2:#181e3a;--border:#1e2448;--gold:#D4AF37;--cyan:#00f2ff;--pink:#ff0050;--orange:#ff8c00;--green:#22c55e;--text:#e0e0e0;--text-bright:#f0f0f0;--muted:#667;--radius:12px}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);padding:24px}
h1{font-size:20px;font-weight:700;color:var(--text-bright);margin-bottom:20px}
h1 small{display:block;font-size:12px;color:var(--muted);font-weight:400;margin-top:4px}

/* ===== 统计卡片 ===== */
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:24px}
.card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:20px;transition:all 0.3s}
.card:hover{transform:translateY(-2px);border-color:rgba(0,242,255,0.15)}
.card .num{font-size:28px;font-weight:700;margin-bottom:2px}
.card .label{font-size:12px;color:var(--muted)}
.card.cyan .num{color:var(--cyan)}
.card.gold .num{color:var(--gold)}
.card.green .num{color:var(--green)}
.card.orange .num{color:var(--orange)}
.card.pink .num{color:var(--pink)}

/* ===== 表格 ===== */
.section{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:20px;margin-bottom:20px}
.section h2{font-size:14px;font-weight:600;color:var(--text-bright);margin-bottom:12px;display:flex;align-items:center;gap:8px}
.section h2 .badge{background:var(--pink);color:#fff;padding:1px 8px;border-radius:10px;font-size:10px;font-weight:600}
.section h2 .badge.ok{background:var(--green)}
.section h2 .badge.warn{background:var(--orange)}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:8px 6px;border-bottom:1px solid var(--border);color:var(--muted);font-weight:600;font-size:11px;white-space:nowrap}
td{padding:8px 6px;border-bottom:1px solid rgba(30,36,72,0.3)}
tr:hover td{background:rgba(0,242,255,0.03)}

/* ===== 状态标签 ===== */
.tag{padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600;display:inline-block}
.tag-ok{background:rgba(34,197,94,0.15);color:var(--green)}
.tag-warn{background:rgba(255,140,0,0.15);color:var(--orange)}
.tag-critical{background:rgba(255,0,80,0.15);color:var(--pink)}
.tag-info{background:rgba(0,242,255,0.12);color:var(--cyan)}

/* ===== 刷新按钮 ===== */
.refresh-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.refresh-bar .ts{font-size:12px;color:var(--muted)}
.btn{padding:8px 18px;border:none;border-radius:var(--radius);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;display:inline-flex;align-items:center;gap:6px;background:linear-gradient(135deg,var(--cyan),#00b8d4);color:#000;box-shadow:0 2px 8px rgba(0,242,255,0.15);transition:all 0.2s}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,242,255,0.3)}
.btn-sm{padding:4px 12px;font-size:11px;border-radius:8px}

/* ===== 告警列表 ===== */
.alert-item{padding:10px 14px;border-radius:8px;margin-bottom:6px;display:flex;align-items:center;gap:10px;font-size:13px}
.alert-p0{background:rgba(255,0,80,0.1);border-left:3px solid var(--pink)}
.alert-p1{background:rgba(255,140,0,0.1);border-left:3px solid var(--orange)}
.alert-p2{background:rgba(0,242,255,0.06);border-left:3px solid var(--cyan)}
.alert-level{font-weight:700;font-size:10px;padding:1px 6px;border-radius:4px}
.alert-p0 .alert-level{background:var(--pink);color:#fff}
.alert-p1 .alert-level{background:var(--orange);color:#fff}
.alert-p2 .alert-level{background:var(--cyan);color:#000}

/* ===== 空状态 ===== */
.empty{padding:30px;text-align:center;color:var(--muted);font-size:14px}

/* ===== Loading ===== */
.loading{padding:40px;text-align:center;color:var(--muted)}
.spinner{width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--cyan);border-radius:50%;animation:spin 0.8s linear infinite;display:inline-block;margin-right:8px;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<h1>
  <i class="fas fa-shield-halved" style="color:var(--cyan)"></i>
  商业履约监控
  <small>Commercial Reality Layer — 订单履约 / 资金 / 系统健康</small>
</h1>

<div class="refresh-bar">
  <span class="ts" id="ts">—</span>
  <button class="btn btn-sm" onclick="refresh()"><i class="fas fa-rotate"></i> 刷新</button>
</div>

<!-- ===== 履约统计 ===== -->
<div id="fulfillment-stats" class="grid"></div>

<!-- ===== 告警 ===== -->
<div class="section" id="alerts-section">
  <h2><i class="fas fa-exclamation-triangle" style="color:var(--orange)"></i> 系统告警</h2>
  <div id="alerts-list"><div class="loading"><span class="spinner"></span>加载中...</div></div>
</div>

<!-- ===== 超期订单 ===== -->
<div class="section">
  <h2><i class="fas fa-clock" style="color:var(--pink)"></i> 超期 / 高风险订单</h2>
  <div id="overdue-table"><div class="loading"><span class="spinner"></span>加载中...</div></div>
</div>

<!-- ===== 资金概览 ===== -->
<div class="section">
  <h2><i class="fas fa-dollar-sign" style="color:var(--gold)"></i> 资金生命周期</h2>
  <div id="payment-summary"><div class="loading"><span class="spinner"></span>加载中...</div></div>
</div>

<!-- ===== 资金明细 ===== -->
<div class="section">
  <h2><i class="fas fa-list" style="color:var(--cyan)"></i> 资金明细</h2>
  <div id="payment-detail"><div class="loading"><span class="spinner"></span>加载中...</div></div>
</div>

<script>
async function refresh() {
  try {
    // 1. 履约仪表盘
    const dash = await (await fetch('/api/reality/fulfillment/dashboard')).json()
    renderFulfillmentStats(dash)

    // 2. 超期订单
    const overdue = await (await fetch('/api/reality/fulfillment/check-overdue')).json()
    renderOverdueTable(overdue)

    // 3. 系统健康
    const health = await (await fetch('/api/reality/health')).json()
    renderAlerts(health)

    // 4. 资金
    const pl = await (await fetch('/api/reality/payment/dashboard')).json()
    renderPayment(pl)

    document.getElementById('ts').textContent = '更新于 ' + new Date().toLocaleTimeString()
  } catch(e) {
    document.querySelectorAll('.loading').forEach(el => el.innerHTML = '<div class="empty">加载失败: ' + e.message + '</div>')
  }
}

function renderFulfillmentStats(d) {
  document.getElementById('fulfillment-stats').innerHTML = `
    <div class="card cyan"><div class="num">${d.total_fulfillments||0}</div><div class="label">总订单</div></div>
    <div class="card green"><div class="num">${d.by_production?.in_progress||0}</div><div class="label">生产中</div></div>
    <div class="card gold"><div class="num">${d.by_shipment?.delivered||0}</div><div class="label">已交付</div></div>
    <div class="card orange"><div class="num">${d.by_risk?.high||0}</div><div class="label">高风险</div></div>
    <div class="card pink"><div class="num">${d.by_risk?.critical||0}</div><div class="label">严重超期</div></div>
    <div class="card" style="border-color:rgba(255,0,80,0.3)"><div class="num" style="color:var(--pink)">${d.unfulfillable||0}</div><div class="label">无法履约</div></div>
    <div class="card orange"><div class="num">${d.overdue_count||0}</div><div class="label">超期未发</div></div>
  `
}

function renderOverdueTable(ov) {
  const t = document.getElementById('overdue-table')
  if (!ov.data || ov.data.length === 0) {
    t.innerHTML = '<div class="empty"><i class="fas fa-check-circle" style="color:var(--green);font-size:24px"></i><br>暂无超期订单</div>'
    return
  }
  t.innerHTML = `<table>
    <tr><th>履约ID</th><th>订单</th><th>承诺交期</th><th>超期(天)</th><th>风险</th><th>生产</th><th>质检</th><th>发货</th></tr>
    ${ov.data.map(r => `<tr>
      <td>${r.fulfillment_id||''}</td>
      <td>#${r.order_id||''}</td>
      <td>${r.promised_delivery_date||''}</td>
      <td style="color:${r.days_overdue>3?'var(--pink)':'var(--orange)'}">${r.days_overdue>0?r.days_overdue+'天':r.days_overdue===0?'今天到期':'还有'+Math.abs(r.days_overdue)+'天'}</td>
      <td><span class="tag tag-${r.risk_level==='CRITICAL'?'critical':r.risk_level==='HIGH'?'warn':'ok'}">${r.risk_level}</span></td>
      <td>${r.production_status||'-'}</td>
      <td>${r.qc_status||'-'}</td>
      <td>${r.shipment_status||'-'}</td>
    </tr>`).join('')}
  </table>
  <div style="margin-top:8px;font-size:12px;color:var(--muted)">共 ${ov.total} 笔待处理</div>`
}

function renderAlerts(h) {
  const el = document.getElementById('alerts-list')
  if (!h.alerts || h.alerts.length === 0) {
    el.innerHTML = '<div class="empty"><i class="fas fa-check-circle" style="color:var(--green)"></i> 所有系统检查通过</div>'
    return
  }
  el.innerHTML = h.alerts.map(a => `
    <div class="alert-item alert-${a.level.toLowerCase()}">
      <span class="alert-level">${a.level}</span>
      <span>${a.message}</span>
      ${a.order_ids ? '<span style="color:var(--muted);font-size:11px">' + a.order_ids.join(', ') + '</span>' : ''}
    </div>
  `).join('')
}

async function renderPayment(pl) {
  // If payment/dashboard endpoint doesn't exist yet, fetch from payment list
  if (!pl || pl.error) {
    // Fallback: show nothing
    document.getElementById('payment-summary').innerHTML = '<div class="empty">资金数据加载中...</div>'
    document.getElementById('payment-detail').innerHTML = ''
    return
  }
  document.getElementById('payment-summary').innerHTML = `
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px">
      <div><span class="label">总金额</span><div style="font-size:20px;font-weight:700;color:var(--gold)">$${pl.total_amount?.toFixed(0)||0}</div></div>
      <div><span class="label">已收款</span><div style="font-size:20px;font-weight:700;color:var(--green)">$${pl.paid_amount?.toFixed(0)||0}</div></div>
      <div><span class="label">未收款</span><div style="font-size:20px;font-weight:700;color:var(--orange)">$${pl.outstanding?.toFixed(0)||0}</div></div>
      <div><span class="label">已退款</span><div style="font-size:20px;font-weight:700;color:var(--pink)">$${pl.refund_total?.toFixed(0)||0}</div></div>
      <div><span class="label">活跃纠纷</span><div style="font-size:20px;font-weight:700;color:var(--pink)">${pl.active_disputes||0}</div></div>
    </div>
  `
  const stages = pl.by_stage || {}
  document.getElementById('payment-detail').innerHTML = `<table>
    <tr><th>阶段</th><th>数量</th></tr>
    ${Object.entries(stages).map(([k,v]) => `<tr><td>${k}</td><td>${v}</td></tr>`).join('')}
  </table>`
}

// Auto-load
refresh()
</script>
</body>
</html>
