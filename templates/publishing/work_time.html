<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>工时管理 — GLOWFORGE</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',-apple-system,sans-serif;background:#0f0f13;color:#e8e8ed;padding:24px;max-width:1200px;margin:0 auto}
.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid #2a2a35}
.header h1{font-size:22px}.header .nav a{color:#888;text-decoration:none;font-size:13px;margin-left:12px}
.controls{display:flex;gap:10px;margin-bottom:20px;align-items:center;flex-wrap:wrap}
.controls button,.controls select,.controls input{padding:8px 14px;border:1px solid #2a2a35;border-radius:8px;background:#16161f;color:#e8e8ed;cursor:pointer;font-size:13px}
.controls button:hover{border-color:#555;background:#1e1e2a}
.controls input{flex:1;min-width:150px}

.production-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:10px;margin-bottom:20px}
.prod-card{background:#16161f;border:1px solid #2a2a35;border-radius:10px;padding:14px;transition:border-color .15s}
.prod-card:hover{border-color:#555}
.prod-card .task-type{font-size:11px;text-transform:uppercase;color:#888;margin-bottom:4px}
.prod-card .task-title{font-size:14px;font-weight:600;margin-bottom:4px}
.prod-card .task-meta{font-size:11px;color:#888}
.prod-card .task-notes{font-size:12px;color:#aaa;margin-top:6px;padding:6px 8px;background:#0f0f13;border-radius:6px}
.prod-card .actions{display:flex;gap:6px;margin-top:8px}
.type-badge{display:inline-block;padding:2px 8px;border-radius:6px;font-size:10px}
.type-badge.video{background:#60a5fa33;color:#60a5fa}
.type-badge.copywriting{background:#34d39933;color:#34d399}
.type-badge.editing{background:#fbbf2433;color:#fbbf24}
.type-badge.planning{background:#a78bfa33;color:#a78bfa}

.btn{padding:7px 14px;border:none;border-radius:7px;cursor:pointer;font-size:12px;transition:all .15s}
.btn-primary{background:#2563eb;color:#fff}.btn-primary:hover{background:#1d4ed8}
.btn-secondary{background:#2a2a35;color:#ccc}.btn-secondary:hover{background:#3a3a45}
.btn-danger{background:#dc2626;color:#fff}
.btn-sm{padding:4px 10px;font-size:11px}

/* Modal */
.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.6);z-index:100;justify-content:center;align-items:center}
.modal.show{display:flex}
.modal-content{background:#1a1a24;border:1px solid #2a2a35;border-radius:16px;padding:24px;width:450px;max-width:90vw}
.modal-content h2{font-size:16px;margin-bottom:16px}
.form-group{margin-bottom:12px}
.form-group label{display:block;font-size:12px;color:#888;margin-bottom:4px}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:8px 12px;background:#0f0f13;border:1px solid #2a2a35;border-radius:8px;color:#e8e8ed;font-size:13px;font-family:inherit}
.form-group textarea{min-height:50px;resize:vertical}
.form-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}
.empty-msg{text-align:center;padding:60px 20px;color:#555}
.empty-msg i{font-size:40px;margin-bottom:8px;color:#333}
.summary-bar{background:#16161f;border:1px solid #2a2a35;border-radius:10px;padding:14px 20px;margin-bottom:16px;display:flex;gap:24px;flex-wrap:wrap}
.summary-bar span{font-size:12px;color:#888}
.summary-bar .num{font-weight:700;color:#e8e8ed;margin-left:4px}
</style></head>
<body>

<div class="header">
  <h1><i class="fas fa-clock"></i> 工时管理 Management</h1>
  <div class="nav">
    <a href="/publishing/dashboard">仪表板</a>
    <a href="/publishing/schedule">发布排期</a>
    <a href="/publishing/analytics">数据分析</a>
  </div>
</div>

<div class="controls">
  <input id="datePicker" type="date">
  <button onclick="loadProduction()"><i class="fas fa-sync"></i> 刷新</button>
  <button class="btn-primary" onclick="showAddTask()"><i class="fas fa-plus"></i> 添加任务</button>
  <span id="statusText" style="font-size:12px;color:#888"></span>
</div>

<div id="summaryBar" class="summary-bar"></div>
<div id="productionGrid" class="production-grid">
  <div class="empty-msg"><i class="fas fa-calendar-plus"></i><p>No production tasks yet.</p><p style="font-size:12px;color:#555">Add video production, copywriting, or editing tasks to plan your day.</p></div>
</div>

<div class="modal" id="taskModal">
  <div class="modal-content">
    <h2>Add Production Task</h2>
    <div class="form-group">
      <label>日期</label>
      <input id="t_date" type="date">
    </div>
    <div class="form-group">
      <label>Task 类型</label>
      <select id="t_type">
        <option value="video_production">视频 Production</option>
        <option value="copywriting">文案</option>
        <option value="editing">剪辑</option>
        <option value="planning">策划</option>
      </select>
    </div>
    <div class="form-group">
      <label>时长 (分钟)</label>
      <input id="t_duration" type="number" value="60" min="15" max="480">
    </div>
    <div class="form-group">
      <label>Status</label>
      <select id="t_status">
        <option value="planned">Planned</option>
        <option value="in_progress">In Progress</option>
        <option value="completed">Completed</option>
        <option value="cancelled">取消led</option>
      </select>
    </div>
    <div class="form-group">
      <label>备注</label>
      <textarea id="t_notes" placeholder="Task details..."></textarea>
    </div>
    <div class="form-actions">
      <button class="btn btn-secondary" onclick="closeTaskModal()">取消</button>
      <button class="btn btn-primary" onclick="saveTask()">保存</button>
    </div>
  </div>
</div>

<script>
async function loadProduction() {
  const date = document.getElementById('datePicker').value;
  let url = '/publishing/api/production';
  if (date) url += '?date=' + date;
  try {
    const r = await fetch(url);
    const tasks = await r.json();
    renderTasks(tasks);
    document.getElementById('statusText').textContent = tasks.length + ' tasks';
  } catch(e) {
    document.getElementById('productionGrid').innerHTML = '<div class="empty-msg"><p>Error loading tasks</p></div>';
  }
}

function renderTasks(tasks) {
  const grid = document.getElementById('productionGrid');
  const bar = document.getElementById('summaryBar');
  if (tasks.length === 0) {
    grid.innerHTML = '<div class="empty-msg"><i class="fas fa-calendar-plus"></i><p>No production tasks for this date.</p></div>';
    bar.innerHTML = '<span>合计: <span class="num">0</span> tasks</span>';
    return;
  }
  const totalMin = tasks.reduce((s,t) => s + (t.duration_分钟||0), 0);
  const by类型 = {};
  tasks.forEach(t => { by类型[t.task_type] = (by类型[t.task_type]||0) + 1; });
  bar.innerHTML = `<span>合计: <span class="num">${tasks.length}</span> tasks</span>
    <span>时长: <span class="num">${totalMin}</span> min (${Math.round(totalMin/60*10)/10}h)</span>
    ${Object.entries(by类型).map(([k,v]) => `<span>${typeLabel(k)}: <span class="num">${v}</span></span>`).join('')}`;

  grid.innerHTML = tasks.map(t => {
    const date = t.date || '-';
    const dur = t.duration_分钟 || 0;
    return `<div class="prod-card">
      <div class="task-type"><span class="type-badge ${typeClass(t.task_type)}">${typeLabel(t.task_type)}</span> ${t.status||'planned'}</div>
      <div class="task-meta">${date} · ${dur}min</div>
      ${t.notes ? `<div class="task-notes">${esc(t.notes)}</div>` : ''}
      <div class="actions">
        <button class="btn btn-sm btn-danger" onclick="deleteTask(${t.id})"><i class="fas fa-trash"></i></button>
      </div>
    </div>`;
  }).join('');
}

function showAddTask() {
  document.getElementById('t_date').value = document.getElementById('datePicker').value || new Date().toISOString().slice(0,10);
  document.getElementById('t_type').value = 'video_production';
  document.getElementById('t_duration').value = '60';
  document.getElementById('t_status').value = 'planned';
  document.getElementById('t_notes').value = '';
  document.getElementById('taskModal').classList.add('show');
}

async function saveTask() {
  const body = {
    date: document.getElementById('t_date').value,
    task_type: document.getElementById('t_type').value,
    duration_分钟: parseInt(document.getElementById('t_duration').value) || 60,
    status: document.getElementById('t_status').value,
    notes: document.getElementById('t_notes').value.trim(),
    content_item_id: 0
  };
  if (!body.date) return alert('Please select a date.');
  await fetch('/publishing/api/production', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body)});
  closeTaskModal();
  loadProduction();
}

async function deleteTask(id) {
  if (!confirm('删除 this task?')) return;
  await fetch(`/publishing/api/production/${id}`, {method:'DELETE'});
  loadProduction();
}

function closeTaskModal() { document.getElementById('taskModal').classList.remove('show'); }

function typeLabel(t) {
  const m = {video_production:'视频', copywriting:'Copy', editing:'编辑', planning:'Plan'};
  return m[t] || t;
}
function typeClass(t) {
  const m = {video_production:'video', copywriting:'copywriting', editing:'editing', planning:'planning'};
  return m[t] || '';
}
function esc(s) { const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }

// Set default date to today
document.getElementById('datePicker').value = new Date().toISOString().slice(0,10);
loadProduction();
</script>
</body>
</html>
